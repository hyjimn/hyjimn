<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 140 38" width="140" height="38" fill="none">
  <defs>
    <clipPath id="btn-clip">
      <rect x="2" y="2" width="136" height="34" rx="3" />
    </clipPath>
    <linearGradient id="shimmer-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0" />
      <stop offset="50%" stop-color="#ffffff" stop-opacity="0.3" />
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0" />
    </linearGradient>
  </defs>

  <style>
    @keyframes shine {
      0% { transform: translateX(-150px) skewX(-30deg); }
      30%, 100% { transform: translateX(180px) skewX(-30deg); }
    }
    .shimmer-rect {
      animation: shine 4s ease-in-out infinite;
    }
    .border-light {
      stroke: #ffffff;
    }
    .text-light {
      fill: #ffffff;
    }
    @media (prefers-color-scheme: light) {
      .border-light {
        stroke: #1a1a24;
      }
      .text-light {
        fill: #1a1a24;
      }
    }
  </style>

  <!-- Button Border (Transparent fill, White bevel) -->
  <rect x="1" y="1" width="138" height="36" rx="3" class="border-light" stroke-width="2" fill="none" />
  <rect x="2" y="2" width="136" height="34" rx="2" stroke="#8a8a8c" stroke-width="0.8" fill="none" />

  <!-- Shimmer Effect inside button -->
  <g clip-path="url(#btn-clip)">
    <rect class="shimmer-rect" x="0" y="0" width="60" height="38" fill="url(#shimmer-grad)" />
  </g>

  <!-- Pixel Art Envelope Icon (Fucsia) -->
  <g transform="translate(18, 5)">
    <rect x="0" y="4" width="16" height="10" rx="1.5" stroke="#ff007f" stroke-width="1.2" fill="none" />
    <path d="M 1,5 L 8,10 L 15,5" stroke="#ff007f" stroke-width="1.2" stroke-linecap="round" />
  </g>

  <!-- Text -->
  <text x="78" y="23" font-family="'MS Sans Serif', Arial, sans-serif" font-size="11" font-weight="bold" class="text-light" text-anchor="middle">Email</text>
</svg>

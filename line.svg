<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 4 90" width="4" height="90" fill="none">
  <style>
    @keyframes flow {
      0% { stroke-dashoffset: 30; }
      100% { stroke-dashoffset: 0; }
    }
    .flow-line {
      animation: flow 2s linear infinite;
    }
  </style>
  <!-- Background line (Muted White) -->
  <line x1="2" y1="0" x2="2" y2="90" stroke="#ffffff" stroke-width="4" opacity="0.15" />
  <!-- Animating dotted signal line (Neon Fuchsia) -->
  <line class="flow-line" x1="2" y1="0" x2="2" y2="90" stroke="#ff007f" stroke-width="4" stroke-dasharray="10 15" />
</svg>

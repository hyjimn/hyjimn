<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 450 400" width="100%" height="100%" fill="none">
  <!-- CSS Animations & Styles -->
  <style>
    @keyframes float-slow {
      0%, 100% { transform: translateY(0px); }
      50% { transform: translateY(-6px); }
    }
    @keyframes tail-wag {
      0%, 100% { transform: rotate(0deg); }
      50% { transform: rotate(-5deg); }
    }
    @keyframes eyes-blink {
      0%, 96%, 100% { transform: scaleY(1); }
      98% { transform: scaleY(0.15); }
    }
    @keyframes spin-sparkle {
      0% { transform: rotate(0deg) scale(0.9); opacity: 0.7; }
      50% { transform: rotate(180deg) scale(1.2); opacity: 1; }
      100% { transform: rotate(360deg) scale(0.9); opacity: 0.7; }
    }
    @keyframes pulse-shadow {
      0%, 100% { transform: scaleX(1); opacity: 0.15; }
      50% { transform: scaleX(1.08); opacity: 0.25; }
    }
    @keyframes play-time {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }

    .cat-group {
      transform-origin: 220px 240px;
      animation: float-slow 4.5s ease-in-out infinite;
    }
    .cat-tail {
      transform-origin: 140px 240px;
      animation: tail-wag 2.5s ease-in-out infinite;
    }
    .cat-eyes {
      transform-origin: 220px 170px;
      animation: eyes-blink 5.5s infinite;
    }
    .shadow-ellipse {
      transform-origin: 220px 320px;
      animation: pulse-shadow 4.5s ease-in-out infinite;
    }
    .sparkle {
      animation: spin-sparkle 5s linear infinite;
    }
    .time-colon {
      animation: play-time 1s step-end infinite;
    }
  </style>

  <!-- 1. RETRO WINAMP CHASSIS (Transparent base with White bevel) -->
  <rect x="10" y="10" width="430" height="380" rx="6" stroke="#ffffff" stroke-width="2.5" fill="none" />
  <rect x="11" y="11" width="428" height="378" rx="5" stroke="#8a8a8c" stroke-width="1" fill="none" />

  <!-- 2. PLAYER TITLE BAR (Solid White) -->
  <rect x="15" y="15" width="420" height="20" fill="#ffffff" />
  <text x="25" y="29" font-family="'MS Sans Serif', Arial, sans-serif" font-size="10" font-weight="bold" fill="#ff007f">Winamp 2.82 - Gato_Player.mp3</text>
  
  <!-- Close Button -->
  <g transform="translate(420, 19)">
    <rect x="0" y="0" width="10" height="10" fill="#eeeeee" stroke="#8a8a8c" stroke-width="0.8" />
    <path d="M 2.5,2.5 L 7.5,7.5 M 7.5,2.5 L 2.5,7.5" stroke="#ff007f" stroke-width="1" />
  </g>

  <!-- 3. MEDIA VISUALIZATION SCREEN (Client Area - Transparent) -->
  <!-- Screen Box -->
  <rect x="20" y="42" width="410" height="260" stroke="#ffffff" stroke-width="1.5" fill="none" />
  <rect x="21" y="43" width="408" height="258" stroke="#8a8a8c" stroke-width="0.8" fill="none" />

  <!-- Time Counter (Top Right of Screen) -->
  <text x="415" y="65" font-family="'Courier New', Courier, monospace" font-size="20" font-weight="bold" fill="#ff007f" text-anchor="end">02<tspan class="time-colon">:</tspan>35</text>
  <!-- Stereo Indicator -->
  <text x="32" y="62" font-family="'MS Sans Serif', Arial, sans-serif" font-size="8" font-weight="bold" fill="#ffffff">STEREO</text>

  <!-- THE CAT MASCOT (Scaled inside visualization screen) -->
  <g transform="translate(0, -10) scale(0.95)">
    <!-- Shadow below cat -->
    <ellipse class="shadow-ellipse" cx="220" cy="320" rx="90" ry="12" fill="#ff007f" opacity="0.15" />

    <!-- The Cat Group (Breathing/Floating) -->
    <g class="cat-group">
      <!-- Tail (Wagging) -->
      <g class="cat-tail" fill="#fff5f5">
        <rect x="120" y="180" width="16" height="16" rx="2" />
        <rect x="104" y="196" width="16" height="16" rx="2" />
        <rect x="120" y="212" width="16" height="32" rx="2" />
        <rect x="136" y="228" width="16" height="16" rx="2" />
      </g>

      <!-- Cat Body & Head -->
      <g fill="#fff5f5">
        <!-- Ears -->
        <rect x="160" y="100" width="16" height="16" rx="2" />
        <rect x="176" y="116" width="16" height="16" rx="2" />
        <rect x="160" y="116" width="16" height="16" rx="2" />
        
        <rect x="264" y="100" width="16" height="16" rx="2" />
        <rect x="248" y="116" width="16" height="16" rx="2" />
        <rect x="264" y="116" width="16" height="16" rx="2" />

        <!-- Head Base -->
        <rect x="176" y="132" width="88" height="64" rx="4" />
        <!-- Cheeks -->
        <rect x="160" y="148" width="16" height="32" rx="2" />
        <rect x="264" y="148" width="16" height="32" rx="2" />

        <!-- Body / Torso -->
        <rect x="160" y="196" width="120" height="80" rx="6" />
        <!-- Paws -->
        <rect x="176" y="276" width="24" height="16" rx="3" />
        <rect x="240" y="276" width="24" height="16" rx="3" />
      </g>

      <!-- Inner Ears (Pastel Fuchsia) -->
      <g fill="#ff007f">
        <rect x="164" y="120" width="8" height="8" rx="1" />
        <rect x="268" y="120" width="8" height="8" rx="1" />
      </g>

      <!-- Cute Blushing Cheeks -->
      <rect x="180" y="174" width="10" height="4" fill="#ff007f" opacity="0.8" rx="1" />
      <rect x="250" y="174" width="10" height="4" fill="#ff007f" opacity="0.8" rx="1" />

      <!-- Eyes (Blinking Group) -->
      <g class="cat-eyes">
        <!-- Left Eye -->
        <rect x="192" y="156" width="12" height="20" rx="2" fill="#ffffff" />
        <rect x="196" y="160" width="8" height="12" rx="1" fill="#ff007f" />
        <!-- Right Eye -->
        <rect x="236" y="156" width="12" height="20" rx="2" fill="#ffffff" />
        <rect x="240" y="160" width="8" height="12" rx="1" fill="#ff007f" />
      </g>

      <!-- Nose / Mouth -->
      <rect x="216" y="176" width="8" height="6" rx="1.5" fill="#ff007f" />
    </g>

    <!-- Sparkles -->
    <!-- Sparkle 1 (Fucsia) -->
    <path class="sparkle" d="M 105,220 L 108,231 L 119,234 L 108,237 L 105,248 L 102,237 L 91,234 L 102,231 Z" fill="#ff007f" />
    <!-- Sparkle 2 (White) -->
    <path class="sparkle" d="M 125,113 L 127,121 L 135,123 L 127,125 L 125,133 L 123,125 L 115,123 L 123,121 Z" fill="#ffffff" style="animation-delay: 2s;" />
  </g>

  <!-- 4. CONTROLS AREA (Below Screen - Transparent fill with White Bevel) -->
  <!-- Prev Button -->
  <g transform="translate(25, 315)">
    <rect x="0" y="0" width="30" height="22" stroke="#ffffff" stroke-width="1.5" fill="none" />
    <path d="M 8,11 L 16,6 L 16,16 Z M 17,11 L 22,7 L 22,15 Z" fill="#ff007f" />
    <line x1="6" y1="6" x2="6" y2="16" stroke="#ff007f" stroke-width="1.5" />
  </g>

  <!-- Play Button -->
  <g transform="translate(60, 315)">
    <rect x="0" y="0" width="30" height="22" stroke="#ffffff" stroke-width="1.5" fill="none" />
    <path d="M 10,6 L 20,11 L 10,16 Z" fill="#ff007f" />
  </g>

  <!-- Pause Button -->
  <g transform="translate(95, 315)">
    <rect x="0" y="0" width="30" height="22" stroke="#ffffff" stroke-width="1.5" fill="none" />
    <rect x="9" y="6" width="4" height="10" fill="#ff007f" />
    <rect x="17" y="6" width="4" height="10" fill="#ff007f" />
  </g>

  <!-- Stop Button -->
  <g transform="translate(130, 315)">
    <rect x="0" y="0" width="30" height="22" stroke="#ffffff" stroke-width="1.5" fill="none" />
    <rect x="9" y="6" width="12" height="10" fill="#ff007f" />
  </g>

  <!-- Next Button -->
  <g transform="translate(165, 315)">
    <rect x="0" y="0" width="30" height="22" stroke="#ffffff" stroke-width="1.5" fill="none" />
    <path d="M 22,11 L 14,6 L 14,16 Z M 13,11 L 8,7 L 8,15 Z" fill="#ff007f" />
    <line x1="24" y1="6" x2="24" y2="16" stroke="#ff007f" stroke-width="1.5" />
  </g>

  <!-- Volume Slider -->
  <text x="212" y="329" font-family="'MS Sans Serif', Arial, sans-serif" font-size="9" font-weight="bold" fill="#ffffff">VOL</text>
  <!-- Inset Slider Line -->
  <rect x="240" y="323" width="170" height="6" stroke="#ffffff" stroke-width="1" fill="none" />
  
  <!-- Slider Thumb -->
  <g transform="translate(330, 314)">
    <rect x="0" y="0" width="10" height="24" stroke="#ffffff" stroke-width="1.5" fill="#eeeeee" />
    <line x1="5" y1="4" x2="5" y2="20" stroke="#ff007f" stroke-width="1.5" />
  </g>

  <!-- KBPS / KHz Stats info box -->
  <g transform="translate(25, 347)">
    <rect x="0" y="0" width="395" height="22" stroke="#ffffff" stroke-width="1.2" fill="none" />
    <rect x="1" y="1" width="393" height="20" stroke="#8a8a8c" stroke-width="0.8" fill="none" />
    <text x="10" y="14" font-family="'Courier New', Courier, monospace" font-size="9" font-weight="bold" fill="#ff007f">KBPS: 320  |  KHZ: 44.1  |  SONG: Lofi_Pixel_Cat.mp3</text>
  </g>
</svg>

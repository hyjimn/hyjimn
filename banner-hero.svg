<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 280" width="100%" height="280" fill="none">
  <!-- CSS Animations & Styles -->
  <style>
    @keyframes float-slow {
      0%, 100% { transform: translateY(0px); }
      50% { transform: translateY(-6px); }
    }
    @keyframes eyes-blink {
      0%, 96%, 100% { transform: scaleY(1); }
      98% { transform: scaleY(0.15); }
    }
    @keyframes spin-sparkle {
      0% { transform: rotate(0deg) scale(0.9); opacity: 0.7; }
      50% { transform: rotate(180deg) scale(1.2); opacity: 1; }
      100% { transform: rotate(360deg) scale(0.9); opacity: 0.7; }
    }
    @keyframes blink {
      0%, 100% { opacity: 0; }
      50% { opacity: 1; }
    }
    @keyframes led-pulse {
      0%, 100% { fill: #ff007f; opacity: 0.5; }
      50% { fill: #ff007f; opacity: 1; }
    }

    .cursor {
      animation: blink 1s step-end infinite;
    }
    .cat-group {
      transform-origin: 220px 240px;
      animation: float-slow 4.5s ease-in-out infinite;
    }
    .cat-eyes {
      transform-origin: 220px 185px;
      animation: eyes-blink 5.5s infinite;
    }
    .sparkle {
      transform-origin: 105px 235px;
      animation: spin-sparkle 5s linear infinite;
    }
    .power-led {
      animation: led-pulse 2s infinite;
    }
  </style>

  <!-- 1. WINDOW SHELL (Transparent base with White 3D Bevel) -->
  <!-- Outer Bevel: White highlights, grey/white shadows -->
  <rect x="1" y="1" width="798" height="278" stroke="#ffffff" stroke-width="2" rx="4" />
  <rect x="2" y="2" width="796" height="276" stroke="#8a8a8c" stroke-width="1" rx="3" />

  <!-- 2. TITLE BAR (Solid White) -->
  <rect x="4" y="4" width="792" height="25" fill="#ffffff" />

  <!-- Title Text (Fucsia) -->
  <text x="15" y="21" font-family="'MS Sans Serif', Arial, sans-serif" font-size="12" font-weight="bold" fill="#ff007f">Jimena_Sanchez.exe</text>

  <!-- Windows Control Buttons (White/Light Grey with Fucsia icons) -->
  <!-- Minimize Button -->
  <g transform="translate(730, 8)">
    <rect x="0" y="0" width="16" height="14" fill="#eeeeee" stroke="#8a8a8c" stroke-width="0.8" />
    <line x1="3" y1="10" x2="11" y2="10" stroke="#ff007f" stroke-width="2" />
  </g>
  
  <!-- Maximize Button -->
  <g transform="translate(750, 8)">
    <rect x="0" y="0" width="16" height="14" fill="#eeeeee" stroke="#8a8a8c" stroke-width="0.8" />
    <rect x="3" y="3" width="10" height="8" stroke="#ff007f" stroke-width="1.5" fill="none" />
  </g>

  <!-- Close Button -->
  <g transform="translate(770, 8)">
    <rect x="0" y="0" width="16" height="14" fill="#eeeeee" stroke="#8a8a8c" stroke-width="0.8" />
    <path d="M 4,3 L 12,11 M 12,3 L 4,11" stroke="#ff007f" stroke-width="1.5" />
  </g>

  <!-- 3. CLIENT AREA (Transparent Console Box with White Border) -->
  <rect x="15" y="42" width="460" height="223" stroke="#ffffff" stroke-width="1.5" fill="none" />
  <rect x="16" y="43" width="458" height="221" stroke="#8a8a8c" stroke-width="0.8" fill="none" />

  <!-- Console Text (White & Fucsia) -->
  <text x="30" y="75" font-family="'Courier New', Courier, monospace" font-size="14" font-weight="bold" fill="#ff007f">C:\WINDOWS\SYSTEM&gt; type info.txt</text>
  
  <text x="30" y="110" font-family="'Courier New', Courier, monospace" font-size="14" font-weight="bold" fill="#ffffff">
    Nombre: <tspan fill="#ff007f">Jimena Sanchez</tspan>
  </text>
  
  <text x="30" y="140" font-family="'Courier New', Courier, monospace" font-size="14" font-weight="bold" fill="#ffffff">
    Carrera: <tspan fill="#a0a0a5">Estudiante de Informática</tspan>
  </text>

  <text x="30" y="170" font-family="'Courier New', Courier, monospace" font-size="14" font-weight="bold" fill="#ffffff">
    Stack: <tspan fill="#ff007f">C#</tspan> | <tspan fill="#ff007f">Python</tspan> | <tspan fill="#ff007f">.NET</tspan>
  </text>

  <text x="30" y="205" font-family="'Courier New', Courier, monospace" font-size="14" font-weight="bold" fill="#ffffff">
    Estado: <tspan fill="#ff007f">Activamente buscando proyectos... ✨</tspan>
  </text>

  <text x="30" y="240" font-family="'Courier New', Courier, monospace" font-size="14" font-weight="bold" fill="#ff007f">&gt; <tspan class="cursor" fill="#ff007f">_</tspan></text>

  <!-- 4. COMPUTER MASCOT (Right Side, white outlines and fucsia screen) -->
  <g transform="translate(425, -45) scale(0.85)">
    <!-- Shadow below computer -->
    <ellipse cx="220" cy="320" rx="90" ry="12" fill="#ff007f" opacity="0.1" />

    <!-- The Computer Group (Floating/Breathing) -->
    <g class="cat-group">
      <!-- Monitor Stand / Neck -->
      <path d="M 205,250 L 235,250 L 245,266 L 195,266 Z" fill="none" stroke="#ffffff" stroke-width="1.5" />
      <line x1="197" y1="265" x2="243" y2="265" stroke="#ff007f" stroke-width="1" />

      <!-- Desktop Case (Horizontal Tower) -->
      <rect x="120" y="265" width="200" height="40" stroke="#ffffff" stroke-width="2" fill="none" />
      <line x1="121" y1="303" x2="319" y2="303" stroke="#8a8a8c" stroke-width="1" />
      
      <!-- Floppy drive slot -->
      <rect x="135" y="278" width="45" height="4" fill="#ff007f" />
      <rect x="145" y="280" width="3" height="3" fill="#ffffff" />
      <!-- CD-ROM Drive slot -->
      <rect x="135" y="288" width="60" height="8" stroke="#ffffff" stroke-width="1.2" fill="none" />
      <rect x="185" y="291" width="6" height="2" fill="#ff007f" />
      <!-- Power button (LED) -->
      <circle class="power-led" cx="295" cy="285" r="4" fill="#ff007f" />

      <!-- Monitor Casing -->
      <rect x="140" y="130" width="160" height="120" rx="14" stroke="#ffffff" stroke-width="2" fill="none" />
      <rect x="141" y="131" width="158" height="118" rx="13" stroke="#8a8a8c" stroke-width="1" fill="none" />

      <!-- Screen Frame Bezel -->
      <rect x="152" y="142" width="136" height="96" rx="8" stroke="#ffffff" stroke-width="1.2" fill="none" />

      <!-- Screen Glass (Neon Fucsia) -->
      <rect x="162" y="152" width="116" height="76" rx="4" stroke="#ff007f" stroke-width="1.8" fill="none" />

      <!-- Kawaii blushing cheeks on screen -->
      <ellipse cx="178" cy="198" rx="8" ry="4" fill="#ff007f" opacity="0.4" />
      <ellipse cx="262" cy="198" rx="8" ry="4" fill="#ff007f" opacity="0.4" />

      <!-- Smile -->
      <path d="M 215,198 Q 220,204 225,198" stroke="#ff007f" stroke-width="2" stroke-linecap="round" fill="none" />

      <!-- Eyes (Blinking Group) -->
      <g class="cat-eyes">
        <path d="M 185,188 L 195,182 L 205,188" stroke="#ff007f" stroke-width="2" stroke-linecap="round" fill="none" />
        <path d="M 235,188 L 245,182 L 255,188" stroke="#ff007f" stroke-width="2" stroke-linecap="round" fill="none" />
      </g>
    </g>

    <!-- Kawaii Sparkles -->
    <!-- Sparkle 1 (Fucsia) -->
    <path class="sparkle" d="M 105,220 L 108,231 L 119,234 L 108,237 L 105,248 L 102,237 L 91,234 L 102,231 Z" fill="#ff007f" />
    <!-- Sparkle 2 (White) -->
    <path class="sparkle" d="M 125,113 L 127,121 L 135,123 L 127,125 L 125,133 L 123,125 L 115,123 L 123,121 Z" fill="#ffffff" style="animation-delay: 2s;" />
    <!-- Plus Icon (Fucsia) -->
    <g transform="translate(315, 105)">
      <rect x="8" y="0" width="4" height="20" rx="1" fill="#ff007f" />
      <rect x="0" y="8" width="20" height="4" rx="1" fill="#ff007f" />
    </g>
  </g>
</svg>

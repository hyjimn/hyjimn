<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 160" width="280" height="160" fill="none">
  <!-- CSS Animations & Styles -->
  <style>
    @keyframes float-pill {
      0%, 100% { transform: translateY(0px); }
      50% { transform: translateY(-3px); }
    }
    .pill-1 { animation: float-pill 3s ease-in-out infinite 0.1s; }
    .pill-2 { animation: float-pill 3s ease-in-out infinite 0.3s; }
    .pill-3 { animation: float-pill 3s ease-in-out infinite 0.5s; }
    .pill-4 { animation: float-pill 3s ease-in-out infinite 0.7s; }
  </style>

  <!-- Outer Bevel Shell (Transparent with White Bevel) -->
  <rect x="1" y="1" width="278" height="158" stroke="#ffffff" stroke-width="2" rx="4" />
  <rect x="2" y="2" width="276" height="156" stroke="#8a8a8c" stroke-width="0.8" rx="3" fill="none" />

  <!-- Title Bar (Solid White) -->
  <rect x="4" y="4" width="272" height="18" fill="#ffffff" />
  <text x="10" y="17" font-family="'MS Sans Serif', Arial, sans-serif" font-size="9" font-weight="bold" fill="#ff007f">Education.exe</text>

  <!-- Close [X] button -->
  <g transform="translate(260, 8)">
    <rect x="0" y="0" width="12" height="10" fill="#eeeeee" stroke="#8a8a8c" stroke-width="0.8" />
    <path d="M 3,2 L 9,8 M 9,2 L 3,8" stroke="#ff007f" stroke-width="1.2" />
  </g>

  <!-- Graduation Cap Pixel Art (Kawaii Fucsia) -->
  <g transform="translate(205, 25)">
    <path d="M 0,5 L 10,0 L 20,5 L 10,10 Z" fill="#ff007f" />
    <path d="M 5,7.5 L 5,12 A 5,5 0 0 0 15,12 L 15,7.5" stroke="#ff007f" stroke-width="1.5" fill="none" />
    <line x1="18.5" y1="5.5" x2="18.5" y2="13" stroke="#ffffff" stroke-width="1.2" />
    <rect x="17.5" y="12" width="2" height="2" fill="#ffffff" />
  </g>

  <!-- Informatics Pill (Beveled Dialog Button) -->
  <g class="pill-1">
    <g transform="translate(14, 40)">
      <rect x="0" y="0" width="112" height="28" stroke="#ffffff" stroke-width="1.5" fill="none" />
      <line x1="0" y1="27" x2="112" y2="27" stroke="#8a8a8c" stroke-width="1" />
      <line x1="111" y1="0" x2="111" y2="28" stroke="#8a8a8c" stroke-width="1" />
      <text x="56" y="17" font-family="'MS Sans Serif', Arial, sans-serif" font-size="10" font-weight="bold" fill="#ffffff" text-anchor="middle">Informatics Eng.</text>
    </g>
  </g>

  <!-- Algorithms Pill (Beveled Dialog Button) -->
  <g class="pill-2">
    <g transform="translate(136, 40)">
      <rect x="0" y="0" width="130" height="28" stroke="#ffffff" stroke-width="1.5" fill="none" />
      <line x1="0" y1="27" x2="130" y2="27" stroke="#8a8a8c" stroke-width="1" />
      <line x1="129" y1="0" x2="129" y2="28" stroke="#8a8a8c" stroke-width="1" />
      <text x="65" y="17" font-family="'MS Sans Serif', Arial, sans-serif" font-size="10" font-weight="bold" fill="#ffffff" text-anchor="middle">Algorithms &amp; Logic</text>
    </g>
  </g>

  <!-- Databases Pill (Beveled Dialog Button) -->
  <g class="pill-3">
    <g transform="translate(14, 76)">
      <rect x="0" y="0" width="112" height="28" stroke="#ffffff" stroke-width="1.5" fill="none" />
      <line x1="0" y1="27" x2="112" y2="27" stroke="#8a8a8c" stroke-width="1" />
      <line x1="111" y1="0" x2="111" y2="28" stroke="#8a8a8c" stroke-width="1" />
      <text x="56" y="17" font-family="'MS Sans Serif', Arial, sans-serif" font-size="10" font-weight="bold" fill="#ffffff" text-anchor="middle">Databases &amp; SQL</text>
    </g>
  </g>

  <!-- OOP Pill (Beveled Dialog Button) -->
  <g class="pill-4">
    <g transform="translate(136, 76)">
      <rect x="0" y="0" width="130" height="28" stroke="#ffffff" stroke-width="1.5" fill="none" />
      <line x1="0" y1="27" x2="130" y2="27" stroke="#8a8a8c" stroke-width="1" />
      <line x1="129" y1="0" x2="129" y2="28" stroke="#8a8a8c" stroke-width="1" />
      <text x="65" y="17" font-family="'MS Sans Serif', Arial, sans-serif" font-size="10" font-weight="bold" fill="#ffffff" text-anchor="middle">OOP / C#</text>
    </g>
  </g>

  <!-- Bottom Inset Console/Status Bar -->
  <g transform="translate(14, 114)">
    <rect x="0" y="0" width="252" height="30" stroke="#ffffff" stroke-width="1.2" fill="none" />
    <rect x="1" y="1" width="250" height="28" stroke="#8a8a8c" stroke-width="0.8" fill="none" />
    <text x="10" y="19" font-family="'Courier New', Courier, monospace" font-size="9" font-weight="bold" fill="#ff007f">C:\STUDY&gt; type univ.log</text>
  </g>
</svg>
